name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  whitespace:
    name: Whitespace check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff --check HEAD~1..HEAD || git diff --check
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fashion_bot
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fashion_bot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fashion_bot
      POSTGRES_DB: fashion_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_PUBLIC_URL: http://localhost:8000
      ADMIN_FRONTEND_URL: http://localhost:5173
      JWT_SECRET: change_me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      TELEGRAM_BOT_TOKEN: put_token_here
      BOT_BACKEND_API_URL: http://backend:8000/api
      OPENAI_API_KEY: put_openai_key_here
      UPLOAD_DIR: /tmp/fashion-fabric-bot/uploads
      MAX_UPLOAD_SIZE_MB: 10
      INITIAL_ADMIN_EMAIL: admin@example.com
      INITIAL_ADMIN_PASSWORD: admin12345
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Compile Python sources
        run: python -m compileall backend/app bot/app bot/check_token.py

      - name: Import FastAPI app
        run: PYTHONPATH=backend python -c "from app.main import app; print(app.title)"

      - name: Import Pydantic schemas
        run: PYTHONPATH=backend python -c "from app.schemas.fabric import FabricRead, FabricCreate, FabricImageRead; print('schemas ok')"

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

  frontend:
    name: Admin frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: admin-frontend
        run: npm install

      - name: Build frontend
        working-directory: admin-frontend
        run: npm run build

  smoke-test:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.example config

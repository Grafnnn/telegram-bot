name: Route preservation smoke

on:
  workflow_dispatch:

jobs:
  route-preservation-smoke:
    name: Route preservation smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fashion_bot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fashion_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: development
      ALLOW_ROUTE_PRESERVATION_SMOKE: "true"
      USER_PHOTO_MASK_MODE: provided
      USER_PHOTO_REQUIRE_MASK_FOR_STRICT_EDIT: "true"
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fashion_bot_test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fashion_bot_test
      POSTGRES_DB: fashion_bot_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_PUBLIC_URL: http://localhost:8000
      ADMIN_FRONTEND_URL: http://localhost:5173
      JWT_SECRET: change_me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      TELEGRAM_BOT_TOKEN: put_token_here
      BOT_BACKEND_API_URL: http://backend:8000/api
      BOT_INTERNAL_TOKEN: test_bot_internal_token
      OPENAI_API_KEY: put_openai_key_here
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_IMAGE_MODEL: gpt-image-1
      OPENAI_IMAGE_SIZE: 1024x1536
      OPENAI_IMAGE_QUALITY: medium
      OPENAI_IMAGE_OUTPUT_FORMAT: png
      OPENAI_IMAGE_TIMEOUT_SECONDS: 120
      UPLOAD_DIR: /tmp/fashion-bot-uploads
      MAX_UPLOAD_SIZE_MB: 10
      MAX_UPLOAD_BYTES: 10485760
      INITIAL_ADMIN_EMAIL: admin@example.com
      INITIAL_ADMIN_PASSWORD: admin12345
      SEED_DEMO_DATA: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Compile route preservation smoke sources
        run: python -m compileall backend/app scripts/smoke_user_photo_preservation_route.py backend/tests/test_user_photo_preservation_route_smoke_script.py

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run route-level preservation smoke tests
        working-directory: backend
        run: pytest -q tests/test_user_photo_preservation_route_smoke_script.py

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fashion_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/fashion_bot}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8000}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN:-change_me_bot_internal_token}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-put_openai_key_here}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
      OPENAI_IMAGE_SIZE: ${OPENAI_IMAGE_SIZE:-1024x1536}
      OPENAI_IMAGE_QUALITY: ${OPENAI_IMAGE_QUALITY:-medium}
      OPENAI_IMAGE_OUTPUT_FORMAT: ${OPENAI_IMAGE_OUTPUT_FORMAT:-png}
      OPENAI_IMAGE_TIMEOUT_SECONDS: ${OPENAI_IMAGE_TIMEOUT_SECONDS:-120}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      ADMIN_LOGIN_RATE_LIMIT: ${ADMIN_LOGIN_RATE_LIMIT:-60}
      BOT_API_RATE_LIMIT: ${BOT_API_RATE_LIMIT:-120}
      GENERATION_RATE_LIMIT: ${GENERATION_RATE_LIMIT:-10}
      UPLOAD_RATE_LIMIT: ${UPLOAD_RATE_LIMIT:-30}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin12345}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - uploads:${UPLOAD_DIR:-/app/uploads}
    depends_on:
      db:
        condition: service_healthy

  bot:
    build:
      context: ./bot
    restart: "no"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-put_token_here}
      BOT_BACKEND_API_URL: ${BOT_BACKEND_API_URL:-http://backend:8000/api}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8000}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN:-change_me_bot_internal_token}
      BOT_BACKEND_TIMEOUT_SECONDS: ${BOT_BACKEND_TIMEOUT_SECONDS:-10}
      BOT_GENERATION_TIMEOUT_SECONDS: ${BOT_GENERATION_TIMEOUT_SECONDS:-180}
    depends_on:
      - backend

  admin-frontend:
    build:
      context: ./admin-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
      VITE_BACKEND_PUBLIC_URL: ${VITE_BACKEND_PUBLIC_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
